# Render blueprint for the Python edition.
#
# Free-tier constraint: persistent disks are a paid feature. We ship
# without one -- state is rebuilt on each cold boot:
#
#   - Fleet DB: `seed_if_empty` re-populates the 35-vehicle corpus from
#     the JSON dumps baked into the image. ~1 second.
#   - Chroma: ingestion re-chunks + re-embeds the 5 SOP markdown files.
#     Fractions of a cent on OpenAI embeddings per boot.
#   - LangGraph checkpoints: conversations don't survive restart. Same
#     ergonomics as the .NET edition's `ConcurrentDictionary`.
#
# Upgrading to Starter ($7/mo) restores persistence with a one-line add:
# a `disk:` block mounting /app/data and pointing the three DATABASE_URL
# / CHECKPOINT_DB_PATH / CHROMA_PERSIST_DIR paths there.

services:
  - type: web
    name: fleetwise-py-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health

    envVars:
      - key: ENVIRONMENT
        value: production

      # --- Data stores (ephemeral, in-container) ------------------------
      # Writable paths inside the container. They vanish on restart; the
      # startup hooks rebuild them idempotently.
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////tmp/fleetwise.db
      - key: CHECKPOINT_DB_PATH
        value: /tmp/checkpoints.db
      - key: CHROMA_PERSIST_DIR
        value: /tmp/chroma

      # SOP markdown corpus ships in the image.
      - key: DOCUMENTS_DIR
        value: /app/documents

      # --- AI providers -------------------------------------------------
      # Default to OpenAI for the hosted demo since we only have an
      # OPENAI_API_KEY on file. Anthropic is still wired up in code; set
      # AI_PROVIDER=anthropic + paste ANTHROPIC_API_KEY in the dashboard
      # to switch. Keeping AI_PROVIDER as a synced value means a fresh
      # blueprint deploy doesn't silently re-pin to a provider we can't
      # authenticate against (which is how the Phase-9 redeploy broke).
      - key: AI_PROVIDER
        value: openai
      - key: ANTHROPIC_CHAT_MODEL
        value: claude-sonnet-4-5
      - key: ANTHROPIC_API_KEY
        sync: false                    # dashboard-prompted secret

      # OpenAI is the embedding source even when chat is Anthropic (Anthropic
      # has no embeddings endpoint). Leaving this unset falls back to Ollama,
      # which isn't reachable from Render's free tier -- so the demo needs
      # an OPENAI_API_KEY for RAG to light up.
      - key: EMBEDDING_PROVIDER
        value: auto
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_API_KEY
        sync: false                    # dashboard-prompted secret

      # --- CORS ---------------------------------------------------------
      # The React frontend gets served from the same origin via FastAPI
      # `StaticFiles` (see FRONTEND_DIST_DIR), so strictly speaking CORS
      # only matters for the Angular frontend pointed at this backend.
      # Keep localhost dev origins in the list so the frontends can hit
      # prod during dev work.
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:4200,http://localhost:5173

      # --- Frontend (Phase 9) ------------------------------------------
      # The Docker image bakes the Vite build into /app/frontend/dist
      # during the multi-stage build; pointing at it explicitly so the
      # app doesn't have to guess from cwd.
      - key: FRONTEND_DIST_DIR
        value: /app/frontend/dist
