name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Run tests
        # Coverage floor at 90% is an enforced ratchet -- new code without
        # tests will trip CI before review even sees it. Local dev intentionally
        # does NOT enforce the floor (in pyproject) so iterating on a half-
        # written change isn't blocked by a coverage drop.
        run: uv run pytest --cov=fleetwise --cov-report=xml --cov-report=term-missing --cov-fail-under=90

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  frontend:
    name: Frontend (eslint + tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          # Matches the Dockerfile's node:20-alpine build stage.
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check + build (tsc -b && vite build)
        run: npm run build

      - name: Test (vitest)
        run: npm test

  docker:
    name: Docker image build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Catch image breakage in CI instead of at Render deploy time. The
      # Dockerfile's RUN --mount=type=cache needs BuildKit (buildx). GHA
      # layer cache keeps repeat runs fast; push is never attempted.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
